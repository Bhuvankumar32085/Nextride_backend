name: Realtime Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "realtime/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t bhuvan32085/nextride-realtime:latest ./realtime

      - run: docker push bhuvan32085/nextride-realtime:latest

      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.REALTIME_RENDER_DEPLOY_HOOK }}"