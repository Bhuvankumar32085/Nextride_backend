name: Booking Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "booking/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t bhuvan32085/nextride-booking:latest ./booking

      - run: docker push bhuvan32085/nextride-booking:latest